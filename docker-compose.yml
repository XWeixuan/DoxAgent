name: doxagent

services:
  monitoring-poller:
    profiles:
      - legacy-debug
    build:
      context: .
      dockerfile: Dockerfile
    image: doxagent:latest
    container_name: doxagent-monitoring-poller
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DOXAGENT_STORAGE_MODE: ${DOXAGENT_STORAGE_MODE:-memory}
      DOXAGENT_MONITORING_POLLER_SLEEP_SECONDS: ${DOXAGENT_MONITORING_POLLER_SLEEP_SECONDS:-15}
      DOXAGENT_STOCKTWITS_STORAGE_MODE: sqlite
      DOXAGENT_STOCKTWITS_SQLITE_PATH: /app/.tmp/stocktwits_polling.sqlite3
    command:
      [
        "python",
        "-m",
        "doxagent.monitoring.cli",
        "poll-forever",
        "--sleep-seconds",
        "${DOXAGENT_MONITORING_POLLER_SLEEP_SECONDS:-15}",
      ]
    volumes:
      - doxagent-cache:/root/.cache
      - doxagent-tmp:/app/.tmp

  runtime-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: doxagent-dashboard:latest
    container_name: doxagent-runtime-scheduler
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.dashboard
        required: false
    environment:
      PYTHONPATH: /app
      DOXAGENT_DASHBOARD_API_MODE: real
      DOXAGENT_STORAGE_MODE: ${DOXAGENT_STORAGE_MODE:-memory}
      DOXAGENT_RUNTIME_SCHEDULER_LOOP_SLEEP_SECONDS: ${DOXAGENT_RUNTIME_SCHEDULER_LOOP_SLEEP_SECONDS:-15}
      DOXAGENT_MODEL_USAGE_STORAGE_MODE: sqlite
      DOXAGENT_MODEL_USAGE_SQLITE_PATH: /app/.tmp/model_usage.sqlite3
      DOXAGENT_MODEL_PRICING_CONFIG_PATH: ${DOXAGENT_MODEL_PRICING_CONFIG_PATH:-}
      DOXAGENT_MODEL_PRICING_DISCOUNT_RATE: ${DOXAGENT_MODEL_PRICING_DISCOUNT_RATE:-0.45}
      DOXAGENT_MODEL_PRICING_CNY_USD_RATE: ${DOXAGENT_MODEL_PRICING_CNY_USD_RATE:-6.8}
      DOXAGENT_STOCKTWITS_STORAGE_MODE: sqlite
      DOXAGENT_STOCKTWITS_SQLITE_PATH: /app/.tmp/stocktwits_polling.sqlite3
    command:
      [
        "python",
        "-m",
        "doxagent.runtime_scheduler.cli",
        "run-loop",
        "--sleep-seconds",
        "${DOXAGENT_RUNTIME_SCHEDULER_LOOP_SLEEP_SECONDS:-15}",
      ]
    volumes:
      - doxagent-cache:/root/.cache
      - doxagent-tmp:/app/.tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-m",
          "doxagent.runtime_scheduler.cli",
          "overview",
        ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: doxagent-dashboard:latest
    container_name: doxagent-dashboard
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.dashboard
        required: false
    environment:
      PYTHONPATH: /app
      DOXAGENT_DASHBOARD_API_MODE: real
      DOXAGENT_DASHBOARD_AUTH_MODE: ${DOXAGENT_DASHBOARD_AUTH_MODE:-supabase}
      DOXAGENT_DASHBOARD_STATIC_DIR: /app/frontend/dashboard/dist
      DOXAGENT_STORAGE_MODE: ${DOXAGENT_STORAGE_MODE:-memory}
      DOXAGENT_MODEL_USAGE_STORAGE_MODE: sqlite
      DOXAGENT_MODEL_USAGE_SQLITE_PATH: /app/.tmp/model_usage.sqlite3
      DOXAGENT_MODEL_PRICING_CONFIG_PATH: ${DOXAGENT_MODEL_PRICING_CONFIG_PATH:-}
      DOXAGENT_MODEL_PRICING_DISCOUNT_RATE: ${DOXAGENT_MODEL_PRICING_DISCOUNT_RATE:-0.45}
      DOXAGENT_MODEL_PRICING_CNY_USD_RATE: ${DOXAGENT_MODEL_PRICING_CNY_USD_RATE:-6.8}
      DOXAGENT_STOCKTWITS_STORAGE_MODE: sqlite
      DOXAGENT_STOCKTWITS_SQLITE_PATH: /app/.tmp/stocktwits_polling.sqlite3
    ports:
      - "127.0.0.1:8780:8780"
    volumes:
      - doxagent-cache:/root/.cache
      - doxagent-tmp:/app/.tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8780/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  doxagent-cache:
  doxagent-tmp:
